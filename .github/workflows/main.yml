name: Update VK Music

on:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests colorthief Pillow

      - name: Run update script
        env:
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USERNAME: ${{ secrets.LASTFM_USERNAME }}
        run: |
          python update_music.py
          echo "Script execution completed successfully"

      - name: Force commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if [ -z "$(git status --porcelain)" ]; then
            git commit --allow-empty -m "chore: Trigger workflow [skip ci]"
          else
            git commit -m "chore: Update music card [skip ci]"
          fi
          git push
